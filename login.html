<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRMS Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
        }
        .login-title {
            color: #00d4aa;
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 5px;
        }
        .login-subtitle {
            color: #8899b4;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 10px;
            padding: 12px 15px;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #00d4aa;
            color: white;
            box-shadow: 0 0 0 0.2rem rgba(0, 212, 170, 0.25);
        }
        .form-label {
            color: #8899b4;
            font-size: 0.85rem;
        }
        .btn-login {
            background: linear-gradient(135deg, #00d4aa, #0099ff);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            color: white;
            margin-top: 10px;
        }
        .btn-login:hover {
            opacity: 0.9;
            color: white;
        }
        .alert-error {
            background: rgba(255, 77, 109, 0.2);
            border: 1px solid #ff4d6d;
            color: #ff4d6d;
            border-radius: 10px;
            padding: 10px 15px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .logo-icon {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-icon">🎓</div>
        <div class="login-title">SRMS</div>
        <div class="login-subtitle">Student Record Management System</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert-error">⚠️ {{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text"
                       class="form-control"
                       name="username"
                       placeholder="Enter username"
                       required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password"
                       class="form-control"
                       name="password"
                       placeholder="Enter password"
                       required>
            </div>
            <button type="submit" class="btn-login">
                🔐 Login
            </button>
        </form>
    </div>
</body>
</html>
