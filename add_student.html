<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #0f1923;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }
        .sidebar {
            background: #1a2535;
            min-height: 100vh;
            padding: 20px;
            width: 250px;
            position: fixed;
        }
        .sidebar-title {
            color: #00d4aa;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid #2d3f55;
            margin-bottom: 20px;
        }
        .nav-link {
            color: #8899b4;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 5px;
            display: block;
            text-decoration: none;
        }
        .nav-link:hover {
            background: #243447;
            color: white;
        }
        .nav-link.active {
            background: linear-gradient(135deg, #00d4aa22, #0099ff22);
            color: #00d4aa;
            border: 1px solid #00d4aa44;
        }
        .main-content {
            margin-left: 250px;
            padding: 30px;
        }
        .form-card {
            background: #1a2535;
            border-radius: 15px;
            padding: 30px;
            border: 1px solid #2d3f55;
        }
        .form-control, .form-select {
            background: #0f1923;
            border: 1px solid #2d3f55;
            color: white;
            border-radius: 10px;
            padding: 12px 15px;
        }
        .form-control:focus, .form-select:focus {
            background: #0f1923;
            border-color: #00d4aa;
            color: white;
            box-shadow: 0 0 0 0.2rem rgba(0, 212, 170, 0.25);
        }
        .form-label {
            color: #8899b4;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }
        .btn-add {
            background: linear-gradient(135deg, #00d4aa, #0099ff);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            color: white;
        }
        .btn-add:hover {
            opacity: 0.9;
            color: white;
        }
        .page-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 25px;
        }
        .btn-logout {
            background: #ff4d6d22;
            border: 1px solid #ff4d6d;
            color: #ff4d6d;
            border-radius: 10px;
            padding: 10px 20px;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 20px;
        }
        .btn-logout:hover {
            background: #ff4d6d;
            color: white;
        }
        .alert-success {
            background: rgba(0, 212, 170, 0.2);
            border: 1px solid #00d4aa;
            color: #00d4aa;
            border-radius: 10px;
            padding: 10px 15px;
            margin-bottom: 20px;
        }
        .form-select option {
            background: #1a2535;
            color: white;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-title">🎓 SRMS</div>
        <nav>
            <a href="/admin" class="nav-link">📊 Dashboard</a>
            <a href="/students" class="nav-link">👨‍🎓 Students</a>
            <a href="/add_student" class="nav-link active">➕ Add Student</a>
            <a href="/marks" class="nav-link">📝 Marks</a>
            <a href="/attendance" class="nav-link">📅 Attendance</a>
        </nav>
        <a href="/logout" class="btn-logout">🚪 Logout</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="page-title">➕ Add New Student</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert-success">✅ {{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="form-card">
            <form method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">👤 Full Name *</label>
                        <input type="text" 
                               class="form-control" 
                               name="name" 
                               placeholder="Enter student name"
                               required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">📞 Phone Number *</label>
                        <input type="text" 
                               class="form-control" 
                               name="phone" 
                               placeholder="Enter phone number"
                               required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">📚 Course *</label>
                        <select class="form-select" name="course" required>
                            <option value="">Select Course</option>
                            <option value="BCA">BCA</option>
                            <option value="BSc IT">BSc IT</option>
                            <option value="MCA">MCA</option>
                            <option value="MSc IT">MSc IT</option>
                            <option value="BE Computer">BE Computer</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">🔐 Password *</label>
                        <input type="password" 
                               class="form-control" 
                               name="password" 
                               placeholder="Set student password"
                               required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">🏠 Address</label>
                    <textarea class="form-control" 
                              name="address" 
                              rows="3"
                              placeholder="Enter student address"></textarea>
                </div>
                <div class="d-flex gap-3">
                    <button type="submit" class="btn-add">
                        ➕ Add Student
                    </button>
                    <a href="/students" 
                       style="background: #243447; border: none; border-radius: 10px; padding: 12px 30px; color: #8899b4; text-decoration: none; font-weight: 600;">
                        ← Back to Students
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
